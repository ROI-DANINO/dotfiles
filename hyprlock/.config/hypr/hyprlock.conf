# hyprlock — modern brand lock screen
# Colors from docs/theme/brand-desktop-palette.md
#   navy #081A2F / #1E3045 · steel #567C8D · light-steel #C8D9E6
#   cream #F0E7D5 · gold #E0B66C · terracotta #C9856F
#
# OLED gradient shown AS-IS (no blur) → the lock appears instantly.
# ~/.local/bin/lock-screen picks a random gradient from backgrounds/ on each lock
# and points ~/.cache/hyprlock/bg.png at it. Add/remove gradients in
# hyprlock/.config/hypr/backgrounds/ to change the rotation.

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.cache/hyprlock/bg.png
    # True-black fallback (OLED) if the cache symlink isn't set up yet.
    color = rgba(000000ff)
}

# ── Time ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(F0E7D5ff)
    font_size = 128
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 8
    shadow_color = rgba(000000cc)
    shadow_boost = 1.2
}

# ── Date ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%a, %d %b' | awk '{print toupper($0)}')"
    color = rgba(F0E7D5ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(000000cc)
    shadow_boost = 1.2
}

# ── Password field ────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 360, 66
    outline_thickness = 2
    rounding = -1
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    # Gradient border (steel → teal, 45°) for a modern, polished edge.
    outer_color = rgba(8FB4C4ff) rgba(2E6E7Eff) 45deg
    inner_color = rgba(0A1A2Ecc)
    font_color  = rgba(F0E7D5ff)

    check_color    = rgba(E0B66Cff)
    fail_color     = rgba(C9856Fff)
    capslock_color = rgba(E0B66Cff)

    fade_on_empty = false
    placeholder_text = <span foreground="##C8D9E6">Enter password</span>
    fail_text = <span foreground="##F0E7D5">$FAIL ($ATTEMPTS)</span>
    hide_input = false

    position = 0, -120
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000099)
}
