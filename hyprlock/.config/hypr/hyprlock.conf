# hyprlock — modern brand lock screen
# Colors from docs/theme/brand-desktop-palette.md
#   navy #081A2F / #1E3045 · steel #567C8D · light-steel #C8D9E6
#   cream #F0E7D5 · gold #E0B66C · terracotta #C9856F
#
# Single image shown AS-IS (no blur) → the lock appears instantly.
# Swap the wallpaper by changing `path` below to any file in ~/Pictures/walpapers/.

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/Pictures/walpapers/pexels-whale-blue-ocean-22670211.jpg
    # No blur — image is shown as-is for an instant lock.
    # A faint dim keeps the clock and field legible over any photo.
    color = rgba(081A2Fff)
}

# ── Time ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(F0E7D5ff)
    font_size = 128
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 8
    shadow_color = rgba(000000cc)
    shadow_boost = 1.2
}

# ── Date ──────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%a, %d %b' | awk '{print toupper($0)}')"
    color = rgba(F0E7D5ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(000000cc)
    shadow_boost = 1.2
}

# ── Password field ────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 54
    outline_thickness = 2
    rounding = 12
    dots_size = 0.26
    dots_spacing = 0.32
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(567C8Dff)
    inner_color = rgba(1E3045cc)
    font_color  = rgba(F0E7D5ff)

    check_color    = rgba(E0B66Cff)
    fail_color     = rgba(C9856Fff)
    capslock_color = rgba(E0B66Cff)

    fade_on_empty = false
    placeholder_text = <span foreground="##C8D9E6">Enter password</span>
    fail_text = <span foreground="##F0E7D5">$FAIL ($ATTEMPTS)</span>
    hide_input = false

    position = 0, -120
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000099)
}
