# BBR congestion control - better for variable WiFi latency
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq
# TCP buffers optimized for WiFi
net.core.rmem_max = 8388608
net.core.wmem_max = 8388608
net.ipv4.tcp_rmem = 4096 131072 4194304
net.ipv4.tcp_wmem = 4096 131072 4194304
# MTU probing - prevents packet size issues
net.ipv4.tcp_mtu_probing = 1
# Faster connection recycling (good for API calls)
net.ipv4.tcp_fastopen = 3
